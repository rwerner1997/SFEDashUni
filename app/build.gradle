plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sfe.dashboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.sfe.dashboard"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "4.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
        debug {
            debuggable true
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    buildFeatures {
        viewBinding false
    }
}

dependencies {
    // appcompat removed - using plain Activity
}
