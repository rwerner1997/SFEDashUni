; SFEDash — ESP32 build
; Target: ESP32 DevKit + ILI9488 480×320 TFT (SPI) + Veepeak ELM327 (BT Classic)
;
; Default SPI wiring (adjust to your board):
;   MOSI  GPIO 23    DC    GPIO 2
;   SCLK  GPIO 18    RST   GPIO 4
;   CS    GPIO 15    BL    GPIO 32  (active-HIGH; tie to 3.3V if no PWM needed)
;
; IR remote: HX1838 receiver data pin GPIO 34 (input-only, ideal for IR)

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    crankyoldgit/IRremoteESP8266 @ ~2.8

build_flags =
    ; ── TFT_eSPI driver config ────────────────────────────────────────────
    -DUSER_SETUP_LOADED
    -DILI9488_DRIVER
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=32
    -DTFT_BACKLIGHT_ON=HIGH
    ; ── Fonts ─────────────────────────────────────────────────────────────
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    ; ── SPI speeds ────────────────────────────────────────────────────────
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    ; ── App config ────────────────────────────────────────────────────────
    -DBT_DEVICE_NAME=\"OBDII\"
    -DBT_PIN=\"1234\"
    -DIR_RECV_PIN=34
